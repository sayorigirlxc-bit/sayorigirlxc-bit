<svg width="900" height="16" viewBox="0 0 900 16" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="divider">
<defs>
  <linearGradient id="dl" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#7c3aed" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#7c3aed" stop-opacity="0.55"/>
    <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="node" cx="50%" cy="50%" r="50%">
    <stop offset="0" stop-color="#e9d5ff"/>
    <stop offset="0.4" stop-color="#a855f7"/>
    <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
  </radialGradient>
  <style>
    @keyframes glide { 0% { transform: translateX(120px); opacity:0;} 15%{opacity:1;} 85%{opacity:1;} 100% { transform: translateX(780px); opacity:0; } }
    .node { animation: glide 4.5s ease-in-out infinite; }
  </style>
</defs>
<rect x="60" y="7" width="780" height="2" rx="1" fill="url(#dl)"/>
<circle class="node" cx="0" cy="8" r="7" fill="url(#node)"/>
</svg>
