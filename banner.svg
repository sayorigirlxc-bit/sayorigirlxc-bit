<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nexora">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a12"/>
      <stop offset="1" stop-color="#13101f"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c084fc"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="320" rx="20" fill="url(#bg)"/>
  <circle cx="250" cy="160" r="260" fill="url(#glow)"/>

  <!-- decorative diagonal lines (right side) -->
  <g stroke="#a855f7" stroke-opacity="0.10" stroke-width="2">
    <line x1="980" y1="40" x2="1240" y2="300"/>
    <line x1="1040" y1="40" x2="1240" y2="240"/>
    <line x1="1100" y1="40" x2="1240" y2="180"/>
    <line x1="920" y1="40" x2="1240" y2="360"/>
  </g>

  <!-- N logomark -->
  <g transform="translate(120,0)">
    <polygon points="90,100 125,100 165,165 165,100 200,100 200,220 165,220 125,155 125,220 90,220"
             fill="url(#purple)"/>
  </g>

  <!-- wordmark -->
  <text x="360" y="150" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="68"
        font-weight="800" letter-spacing="10" fill="#ffffff">NEXORA</text>

  <!-- tagline -->
  <text x="362" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24"
        font-weight="400" fill="#b8a9d9">Soluções digitais que <tspan fill="#c084fc" font-weight="600">impulsionam</tspan> negócios.</text>

  <!-- thin accent bar -->
  <rect x="362" y="222" width="300" height="3" rx="2" fill="url(#purple)"/>
</svg>
